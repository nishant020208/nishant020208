name: Update Streak Stats

on:
  schedule:
    - cron: "0 1 * * *"   # 01:00 UTC daily
  workflow_dispatch:        # manual trigger
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate main streak SVG
        env:
          GITHUB_TOKEN: ${{ secrets.STREAK_TOKEN }}
        run: |
          echo "==> Generating main streak stats..."
          python .github/scripts/generate_streak.py

      - name: Generate weekly streak SVG
        env:
          GITHUB_TOKEN: ${{ secrets.STREAK_TOKEN }}
        run: |
          echo "==> Generating weekly streak stats..."
          python .github/scripts/generate_streak_weekly.py

      - name: Commit and push SVGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/streak.svg profile/streak-weekly.svg
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || (git commit -m "chore: update streak stats [skip ci]" && git push)
