name: Update README and SVG Stats

on:
  schedule:
    - cron: "*/30 * * * *"   # Runs every 30 minutes
  workflow_dispatch:        # Allows manual triggering
  repository_dispatch:      # Allows triggering via API (e.g. from other repos or local scripts)
    types: [update-stats]
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: update-readme-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pillow

      - name: Regenerate SVG Stats
        env:
          GITHUB_TOKEN: ${{ secrets.STREAK_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "==> Updating SVGs with live stats..."
          python update.py

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add dark.svg light.svg profile/streak.svg profile/streak-weekly.svg profile/github-stats.svg profile/top-langs.svg
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update profile banner and streak stats [skip ci]"
          
          # Retry loop with stashing/rebasing to prevent push conflicts
          for i in {1..5}; do
            echo "Attempt $i to push changes..."
            git fetch origin main
            if git rebase origin/main; then
              if git push origin main; then
                echo "Successfully pushed changes!"
                exit 0
              fi
            else
              echo "Rebase failed, aborting..."
              git rebase --abort
            fi
            echo "Push failed or rebase failed, retrying in 5 seconds..."
            sleep 5
          done
          echo "Error: Failed to push stats update after 5 attempts."
          exit 1
