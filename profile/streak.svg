<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="isolation:isolate" viewBox="0 0 900 195" width="900" height="195">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6EC7"/>
      <stop offset="100%" stop-color="#c44ea8"/>
    </linearGradient>
    <filter id="blur" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
    </filter>
    <clipPath id="clip">
      <rect rx="10" ry="10" width="900" height="195"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect clip-path="url(#clip)" x="0" y="0" width="900" height="195" fill="#0D1117"/>
  <!-- Subtle top glow -->
  <rect x="0" y="0" width="900" height="2" fill="url(#ringGrad)" opacity="0.6"/>
  <!-- Dividers -->
  <line x1="300" y1="25" x2="300" y2="170" stroke="#30363d" stroke-width="1"/>
  <line x1="600" y1="25" x2="600" y2="170" stroke="#30363d" stroke-width="1"/>

  <!-- === LEFT PANEL: Total Contributions === -->
  <g transform="translate(150, 98)">
    <text x="0" y="-32" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="400" fill="#36BCF7">Total Contributions</text>
    <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="32" font-weight="800" fill="url(#ringGrad)">Loading…</text>
    <text x="0" y="32" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" fill="#AAAAAA">Updating automatically</text>
  </g>

  <!-- === CENTER PANEL: Current Streak (fire ring) === -->
  <g transform="translate(450, 98)">
    <!-- Outer glow ring -->
    <circle cx="0" cy="-12" r="50" fill="none" stroke="#FF6EC720" stroke-width="6" filter="url(#blur)"/>
    <circle cx="0" cy="-12" r="44" fill="none" stroke="url(#ringGrad)" stroke-width="3" stroke-dasharray="276.5" stroke-dashoffset="0" stroke-linecap="round"/>
    <!-- Fire emoji -->
    <text x="0" y="-6" text-anchor="middle" font-size="30">🔥</text>
    <!-- Streak number -->
    <text x="0" y="52" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="32" font-weight="800" fill="#FFFFFF">--</text>
    <text x="0" y="76" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="400" fill="#36BCF7">Current Streak</text>
  </g>

  <!-- === RIGHT PANEL: Longest Streak === -->
  <g transform="translate(750, 98)">
    <text x="0" y="-32" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="13" font-weight="400" fill="#36BCF7">Longest Streak</text>
    <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="32" font-weight="800" fill="url(#ringGrad)">--</text>
    <text x="0" y="32" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" fill="#AAAAAA">Auto-updates daily</text>
  </g>
</svg>
