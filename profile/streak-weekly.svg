<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" style="isolation:isolate" viewBox="0 0 500 195" width="500" height="195">
  <defs>
    <linearGradient id="ringGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#36BCF7"/>
      <stop offset="100%" stop-color="#0e7db5"/>
    </linearGradient>
    <filter id="blur2" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
    </filter>
    <clipPath id="clip2">
      <rect rx="10" ry="10" width="500" height="195"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect clip-path="url(#clip2)" x="0" y="0" width="500" height="195" fill="#0D1117"/>
  <!-- Subtle top glow -->
  <rect x="0" y="0" width="500" height="2" fill="url(#ringGrad2)" opacity="0.6"/>
  <!-- Dividers -->
  <line x1="166" y1="25" x2="166" y2="170" stroke="#30363d" stroke-width="1"/>
  <line x1="334" y1="25" x2="334" y2="170" stroke="#30363d" stroke-width="1"/>

  <!-- === LEFT: Total Contributions === -->
  <g transform="translate(83, 98)">
    <text x="0" y="-32" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" fill="#FF6EC7">Total Contributions</text>
    <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="26" font-weight="800" fill="url(#ringGrad2)">Loading…</text>
    <text x="0" y="30" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="10" fill="#AAAAAA">Weekly mode</text>
  </g>

  <!-- === CENTER: Current Streak === -->
  <g transform="translate(250, 98)">
    <circle cx="0" cy="-12" r="44" fill="none" stroke="#36BCF720" stroke-width="6" filter="url(#blur2)"/>
    <circle cx="0" cy="-12" r="38" fill="none" stroke="url(#ringGrad2)" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="-4" text-anchor="middle" font-size="24">🔥</text>
    <text x="0" y="50" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="26" font-weight="800" fill="#FFFFFF">--</text>
    <text x="0" y="72" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" fill="#FF6EC7">Current Streak</text>
  </g>

  <!-- === RIGHT: Longest Streak === -->
  <g transform="translate(417, 98)">
    <text x="0" y="-32" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="11" fill="#FF6EC7">Longest Streak</text>
    <text x="0" y="8" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="26" font-weight="800" fill="url(#ringGrad2)">--</text>
    <text x="0" y="30" text-anchor="middle" font-family="'Segoe UI', Ubuntu, sans-serif" font-size="10" fill="#AAAAAA">Auto-updates daily</text>
  </g>
</svg>
