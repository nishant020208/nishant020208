  <tspan x="30" dy="8.2">*####**#**#**#%@%@%#%##=+@%%@%*%%##%%******##*###**###**</tspan>
  <tspan x="30" dy="8.2">**#*##*+*#######%@%%%#**#@%%@#%@%%#@%*******##*##*#####*</tspan>
  <tspan x="30" dy="8.2">####*#****#######%##%%**#@%%%%%%#%%@%#*******%%########*</tspan>
